name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-native:
    name: Rust (all targets)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu,aarch64-apple-darwin,x86_64-apple-darwin,x86_64-pc-windows-gnu

      - uses: mlugg/setup-zig@v2
        with:
          version: latest

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-rust

      - name: Install cargo-zigbuild
        run: cargo install cargo-zigbuild --locked

      - name: Create Zig CC shims
        run: |
          mkdir -p ~/.local/bin
          for target in aarch64-macos x86_64-macos x86_64-windows-gnu; do
            printf '#!/bin/sh\nexec zig cc -target %s "$@"\n' "$target" \
              > ~/.local/bin/zigcc-$target
            chmod +x ~/.local/bin/zigcc-$target
          done
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Build all targets
        working-directory: src-rust
        env:
          CC_aarch64_apple_darwin: zigcc-aarch64-macos
          CC_x86_64_apple_darwin: zigcc-x86_64-macos
          CC_x86_64_pc_windows_gnu: zigcc-x86_64-windows-gnu
        run: |
          cargo zigbuild --target x86_64-unknown-linux-gnu --release
          cargo zigbuild --target aarch64-apple-darwin --release
          cargo zigbuild --target x86_64-apple-darwin --release
          cargo zigbuild --target x86_64-pc-windows-gnu --release

      - name: Stage native libs
        run: |
          mkdir -p native-out/{linux,windows,mac_arm,mac_x86}
          cp src-rust/target/x86_64-unknown-linux-gnu/release/libgreeter_jni.so native-out/linux/
          cp src-rust/target/x86_64-pc-windows-gnu/release/greeter_jni.dll      native-out/windows/
          cp src-rust/target/aarch64-apple-darwin/release/libgreeter_jni.dylib  native-out/mac_arm/
          cp src-rust/target/x86_64-apple-darwin/release/libgreeter_jni.dylib   native-out/mac_x86/

      - uses: actions/upload-artifact@v4
        with:
          name: native-all
          path: native-out/
          if-no-files-found: error

  assemble-jar:
    name: Assemble JAR
    needs: build-native
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v4
        with:
          name: native-all
          path: src/main/resources/native/

      - uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: temurin

      - uses: gradle/actions/setup-gradle@v4

      - run: ./gradlew build

      - uses: actions/upload-artifact@v4
        with:
          name: greeter-${{ github.sha }}
          path: build/libs/*.jar
          if-no-files-found: error
