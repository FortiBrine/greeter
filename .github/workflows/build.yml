name: Build

on:
  push:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-native:
    name: Rust (${{ matrix.target }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CARGO_INCREMENTAL: 0
      CARGO_TERM_COLOR: always
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu.2.17
            out_dir: linux
            lib: libgreeter_jni.so
          - target: x86_64-pc-windows-gnu
            out_dir: windows
            lib: greeter_jni.dll
          - target: aarch64-apple-darwin
            out_dir: mac_arm
            lib: libgreeter_jni.dylib
          - target: x86_64-apple-darwin
            out_dir: mac_x86
            lib: libgreeter_jni.dylib
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: mlugg/setup-zig@v2
        with:
          version: "0.14.1"
          cache-key: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-rust
          key: ${{ matrix.target }}
      - name: Cache cargo-zigbuild
        id: cache-zigbuild
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-zigbuild
          key: cargo-zigbuild-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
      - name: Install cargo-zigbuild
        if: steps.cache-zigbuild.outputs.cache-hit != 'true'
        run: cargo install cargo-zigbuild --locked
      - name: Build
        working-directory: src-rust
        run: cargo zigbuild --target ${{ matrix.target }} --release
      - name: Stage
        run: |
          mkdir -p staging/${{ matrix.out_dir }}
          cp src-rust/target/${{ matrix.target }}/release/${{ matrix.lib }} staging/${{ matrix.out_dir }}/
      - uses: actions/upload-artifact@v7
        with:
          name: native-${{ matrix.out_dir }}
          path: staging/
          if-no-files-found: error
          retention-days: 1

  assemble-jar:
    name: Assemble JAR
    needs: build-native
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          pattern: native-*
          merge-multiple: true
          path: src/main/resources/native/
      - uses: actions/setup-java@v5
        with:
          java-version: '8'
          distribution: temurin
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew build
      - uses: actions/upload-artifact@v7
        with:
          name: greeter-${{ github.sha }}
          path: build/libs/*.jar
          if-no-files-found: error
          retention-days: 30